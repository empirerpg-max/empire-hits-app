<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Hits Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a0033; color: #d4af37; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .container { width: 100%; max-width: 450px; }
        h2 { letter-spacing: 2px; text-transform: uppercase; margin-top: 0; font-size: 22px; }
        video { width: 100%; max-height: 60vh; border: 2px solid #d4af37; border-radius: 15px; background: #000; box-shadow: 0 0 30px rgba(0,0,0,0.5); object-fit: contain; }
        .btn-ready { background: #d4af37; color: #1a0033; border: none; padding: 18px 30px; border-radius: 40px; font-weight: bold; font-size: 16px; margin-top: 25px; width: 100%; display: none; cursor: pointer; animation: pulse 1.5s infinite; text-transform: uppercase; }
        #status { font-size: 14px; color: #bbb; margin-top: 15px; line-height: 1.4; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>Empire Hits</h2>
        <video id="empireVideo" playsinline controls preload="auto">
            <source src="https://www.dropbox.com/scl/fi/37yyt40zzagodb5mwbyk4/0327-1.mp4?rlkey=5g3phccxtovo53ny3oa0xyrpg&st=hk0ip0ke&raw=1" type="video/mp4">
        </video>
        <p id="status">Assista 80% do episódio com som ligado<br>para liberar sua pergunta oficial.</p>
        <button id="quizBtn" class="btn-ready" onclick="enviarSinal()">🏆 LIBERAR PERGUNTA</button>
    </div>

    <script>
        const video = document.getElementById('empireVideo');
        const btn = document.getElementById('quizBtn');
        const status = document.getElementById('status');
        let metaBatida = false;
        let lastTime = 0;

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        video.onseeking = function() {
            if (video.currentTime > lastTime) { video.currentTime = lastTime; }
        };

        video.ontimeupdate = function() {
            if (!video.seeking) { lastTime = video.currentTime; }
            let progresso = video.currentTime / video.duration;
            let volumeOk = !video.muted && video.volume > 0.1;

            if (progresso >= 0.8 && volumeOk && !metaBatida) {
                metaBatida = true;
                btn.style.display = 'block';
                status.innerHTML = "✅ <b>Episódio Validado!</b><br>Clique abaixo para o Quiz.";
            }
        };

        function enviarSinal() {
            const user = window.Telegram.WebApp.initDataUnsafe.user;
            const scriptURL = "https://script.google.com/macros/s/AKfycbx2Prro_COe0hYNIpx2aVsNMPjFjNC5UqxttuDN3SkCTFhCLzajiJ7cfjp3Ul3zYuA/exec";

            if (!user) { alert("Erro: Abra pelo Telegram!"); return; }

            btn.innerText = "⌛ VALIDANDO...";
            btn.disabled = true;

            // Envia o sinal direto para o Google Apps Script
            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    "action": "ASSISTIU_OK",
                    "userId": user.id,
                    "nome": user.first_name
                })
            }).then(() => {
                setTimeout(() => { window.Telegram.WebApp.close(); }, 500);
            });
        }
    </script>
</body>
</html>
