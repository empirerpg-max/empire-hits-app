<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Hits Player</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a0033; color: #d4af37; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 450px; }
        h2 { letter-spacing: 2px; text-transform: uppercase; margin-top: 0; }
        
        /* Ajuste do Player para não esticar */
        video { 
            width: 100%; 
            max-height: 60vh; /* Não ocupa a tela toda se for vertical */
            border: 2px solid #d4af37; 
            border-radius: 15px; 
            background: #000; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            object-fit: contain; /* Garante que o vídeo caiba no box sem esticar */
        }

        .btn-ready { background: #d4af37; color: #1a0033; border: none; padding: 18px 30px; border-radius: 40px; font-weight: bold; font-size: 16px; margin-top: 25px; width: 100%; display: none; cursor: pointer; animation: pulse 1.5s infinite; }
        #status { font-size: 14px; color: #bbb; margin-top: 15px; line-height: 1.4; }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(212, 175, 55, 0); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Empire Hits</h2>
        
<video id="empireVideo" playsinline controls preload="metadata" style="width:100%; border: 2px solid #d4af37; border-radius: 15px; background: #000; object-fit: contain;">
   <iframe src="https://drive.google.com/file/d/10Rdfh7JfHU97Iwppk7AvefKA7Vv6XxGf/preview" width="640" height="480"></iframe>
    Seu navegador não suporta vídeos.
</video>

        <p id="status">Assista 80% do vídeo com som ligado<br>para liberar sua pergunta oficial.</p>
        <button id="quizBtn" class="btn-ready" onclick="enviarSinal()">🏆 LIBERAR PERGUNTA</button>
    </div>

    <script>
        const video = document.getElementById('empireVideo');
        const btn = document.getElementById('quizBtn');
        const status = document.getElementById('status');
        let metaBatida = false;
        let lastTime = 0;

        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();

        video.onseeking = function() {
            if (video.currentTime > lastTime) { video.currentTime = lastTime; }
        };

        video.ontimeupdate = function() {
            if (!video.seeking) { lastTime = video.currentTime; }
            let progresso = video.currentTime / video.duration;
            let volumeOk = !video.muted && video.volume > 0.1;

            if (progresso >= 0.8 && volumeOk && !metaBatida) {
                metaBatida = true;
                btn.style.display = 'block';
                status.innerHTML = "✅ <b>Visualização validada!</b><br>Clique no botão para receber o Quiz.";
            }
        };

        function enviarSinal() {
            window.Telegram.WebApp.sendData("ASSISTIU_OK");
        }
    </script>
</body>
</html>
